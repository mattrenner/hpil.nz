<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haku Property Investments Limited</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 35%),
        linear-gradient(135deg, #f7f4ef 0%, #e9e2d8 100%);
      color: #1f2933;
      font-family: "Times New Roman", Times, Georgia, serif;
    }

    main {
      text-align: center;
      padding: 3rem;
    }

    h1 {
      margin: 0;
      font-family: "Times New Roman", Times, Georgia, serif;
      font-size: clamp(1.1rem, 2vw, 1.65rem);
      font-weight: 400;
      letter-spacing: 0.035em;
      line-height: 1.35;
    }

    .line {
      width: 56px;
      height: 1px;
      margin: 1.35rem auto 0;
      background: rgba(31, 41, 51, 0.32);
    }
  </style>
</head>
<body>
  <main>
    <h1>Haku Property Investments Limited</h1>
    <div class="line" aria-hidden="true"></div>
  </main>
</body>
</html>
